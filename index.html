  <script type="text/javascript">
    (function (l) {
      // Redirect /index.html to /
      if (l.pathname.endsWith('/index.html')) {
        window.history.replaceState(null, null, l.pathname.replace(/\/index\.html$/, '/'));
      }
      var q = l.search;
      if (q[1] === '/' || q.indexOf('?p=') === 0) {
        var path = q.indexOf('?p=') === 0 ? q.slice(3) : q.slice(1);
        var decoded = path.split('&').map(function (s) {
          return s.replace(/~and~/g, '&')
        }).join('?');
        window.history.replaceState(null, null,
          l.pathname.slice(0, -1) + decoded + l.hash
        );
      }
    }(window.location))
  </script>
